<!DOCTYPE html>
<html>

<head>

<title>House For Sale</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#000000,#1a0000,#000000);
color:white;
}

/* header */

header{
background:#b30000;
text-align:center;
padding:25px;
font-size:22px;
font-weight:bold;
}

/* hero banner */

.hero{
height:300px;
background:url('front.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
}

/* navigation */

nav{
background:#111;
text-align:center;
padding:12px;
}

nav button{
background:#b30000;
color:white;
border:none;
padding:12px 22px;
margin:5px;
cursor:pointer;
font-size:16px;
border-radius:6px;
}

/* sections */

section{
display:none;
padding:30px;
text-align:center;
}

.active{
display:block;
}

/* cards */

.card{
background:#111;
padding:25px;
border-radius:10px;
max-width:700px;
margin:auto;
box-shadow:0 0 10px rgba(255,0,0,0.4);
}

/* gallery */

.gallery img{
width:260px;
margin:10px;
border-radius:10px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.gallery video{
width:320px;
margin:10px;
border-radius:10px;
}

/* contact */

.contact a{
display:inline-block;
background:#b30000;
padding:14px 24px;
margin:10px;
color:white;
text-decoration:none;
border-radius:8px;
font-size:16px;
}

.contact a:hover{
background:#ff0000;
}

</style>

<script>

function showPage(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

}

</script>

</head>


<body>

<header>

🏠 House For Sale – Direct Owner

</header>


<div class="hero">

Beautiful Family House

</div>


<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('photos')">Photos</button>
<button onclick="showPage('videos')">Videos</button>
<button onclick="showPage('contact')">Contact</button>

</nav>


<section id="home" class="active">

<div class="card">

<h2>Property Details</h2>

<p>📍 Location: Gadag</p>
<p>🛏 Bedrooms: 2</p>
<p>🛋 Hall: 1</p>
<p>🍳 Kitchen: 1</p>
<p>🚿 Bathroom: 1</p>
<p>📏 Area: 1200 sqft</p>
<p>💰 Price: Contact Owner</p>

</div>

</section>


<section id="photos">

<h2>House Photos</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.png">

</div>

</section>


<section id="videos">

<h2>House Video Tour</h2>

<div class="gallery">

<video controls>
<source src="video1.mp4">
</video>

</div>

</section>


<section id="contact">

<h2>Contact Owner</h2>

<div class="contact">

<a href="tel:9164933655">📞 Call 9164933655</a>

<a href="tel:9243991003">📞 Call 9243991003</a>

<a href="https://wa.me/919164933655">💬 WhatsApp</a>

</div>

</section>


</body>

</html>
