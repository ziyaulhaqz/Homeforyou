<!DOCTYPE html>
<html>

<head>

<title>House For Sale</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

header{
background:#b30000;
text-align:center;
padding:20px;
font-size:22px;
}

nav{
background:#111;
text-align:center;
padding:10px;
}

nav button{
background:#b30000;
color:white;
border:none;
padding:10px 18px;
margin:5px;
cursor:pointer;
border-radius:6px;
}

section{
display:none;
padding:25px;
text-align:center;
}

.gallery img{
width:260px;
margin:10px;
border-radius:10px;
}

.gallery video{
width:320px;
margin:10px;
border-radius:10px;
}

.contact a{
display:inline-block;
background:#b30000;
padding:12px 20px;
margin:10px;
color:white;
text-decoration:none;
border-radius:8px;
}

</style>

<script>

function showPage(id){

var sections=document.querySelectorAll("section");

for(var i=0;i<sections.length;i++){
sections[i].style.display="none";
}

document.getElementById(id).style.display="block";

}

window.onload=function(){
showPage("home");
}

/* simple page counter */

if(localStorage.pagecount){
localStorage.pagecount=Number(localStorage.pagecount)+1;
}else{
localStorage.pagecount=1;
}

</script>

</head>


<body>

<header>

🏠 House For Sale – Direct Owner

</header>

<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('photos')">Photos</button>
<button onclick="showPage('videos')">Videos</button>
<button onclick="showPage('location')">Location</button>
<button onclick="showPage('contact')">Contact</button>

</nav>


<section id="home">

<h2>Property Details</h2>

<p>📍 Location: Gadag</p>
<p>🛏 Bedrooms: 2</p>
<p>🛋 Hall: 1</p>
<p>🍳 Kitchen: 1</p>
<p>🚿 Bathroom: 1</p>
<p>📏 Area: 1200 sqft</p>
<p>💰 Price: Contact Owner</p>

<p id="views"></p>

</section>


<section id="photos">

<h2>House Photos</h2>

<div class="gallery">

<a href="house-photo1.jpg" target="_blank">
<img src="house-photo1.jpg">
</a>

</div>

</section>


<section id="videos">

<h2>House Video Tour</h2>

<div class="gallery">

<video controls>
<source src="house-video1.mp4">
</video>

</div>

</section>


<section id="location">

<h2>Property Location</h2>

<iframe
width="100%"
height="350"
src="https://maps.google.com/maps?q=gadag&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</section>


<section id="contact">

<h2>Contact Owner</h2>

<div class="contact">

<a href="tel:9164933655">📞 Call 9164933655</a>

<a href="tel:9243991003">📞 Call 9243991003</a>

<a href="https://wa.me/919164933655">💬 WhatsApp</a>

</div>

</section>


<script>
document.getElementById("views").innerHTML="👀 Page Views: "+localStorage.pagecount;
</script>

</body>

</html>
