<!DOCTYPE html>
<html>

<head>

<title>House For Sale</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
}

header{
background:#b30000;
text-align:center;
padding:25px;
}

nav{
background:#111;
text-align:center;
padding:10px;
}

nav button{
background:#b30000;
color:white;
border:none;
padding:10px 20px;
margin:5px;
cursor:pointer;
font-size:16px;
}

section{
display:none;
padding:20px;
}

.active{
display:block;
}

.banner{
width:100%;
height:250px;
background:url('front.jpg');
background-size:cover;
background-position:center;
}

.gallery img{
width:260px;
margin:10px;
border-radius:8px;
}

.gallery video{
width:300px;
margin:10px;
}

.details{
background:#111;
padding:20px;
border-radius:10px;
max-width:700px;
margin:auto;
}

.contact{
text-align:center;
margin-top:20px;
}

.contact a{
display:inline-block;
background:#b30000;
padding:12px 20px;
margin:10px;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>

<script>

function showPage(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

}

</script>

</head>


<body>

<header>

<h1>House For Sale</h1>
<p>Direct Owner Property</p>

</header>

<div class="banner"></div>


<nav>

<button onclick="showPage('home')">Home</button>
<button onclick="showPage('photos')">Photos</button>
<button onclick="showPage('videos')">Videos</button>
<button onclick="showPage('contact')">Contact</button>

</nav>


<section id="home" class="active">

<div class="details">

<h2>Property Details</h2>

<p>📍 Location: Gadag</p>
<p>🛏 Bedrooms: 2</p>
<p>🛋 Hall: 1</p>
<p>🍳 Kitchen: 1</p>
<p>🚿 Bathroom: 1</p>

<p>📏 Area: 1200 sqft</p>

<p>💰 Price: Contact Owner</p>

</div>

</section>


<section id="photos">

<h2>House Photos</h2>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">

</div>

</section>


<section id="videos">

<h2>House Videos</h2>

<div class="gallery">

<video controls>
<source src="video1.mp4">
</video>

<video controls>
<source src="video2.mp4">
</video>

</div>

</section>


<section id="contact">

<h2>Contact Owner</h2>

<div class="contact">

<a href="tel:9000000000">📞 Call Now</a>

<a href="https://wa.me/919000000000">💬 WhatsApp</a>

</div>

</section>


</body>

</html>
